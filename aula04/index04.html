<!-- Aula 04 - Minha Primeira Página -->
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Minha Primeira Página - ADS</title>
    <link rel="stylesheet" href="css/style04.css">
    <!-- rel="stylesheet": Diz que o arquivo é uma "folha de estilo" (CSS). -->
    <!-- href="css/style04.css": É o caminho. Como seu arquivo está dentro da pasta css, você precisa indicar nome_da_pasta/nome_do_arquivo. -->
</head>

<body>
    <div class="menu">
        <!--'class="menu"' para o caso de usar outros menus ou estilos parecidos. No CSS usamos o ponto: .menu. -->
        <a href="#"> Início</a>
        <a href="#seçao-hobbies">Ver meus Hobbies</a>
        <a href="#meu-curso">Ver meu Curso</a>

    </div>

    <div id="seçao-hobbies">
        <!-- id="secao-hobbies": Usamos por ser um endereço exato. No HTML do link, usamos # para dizer "vá para este endereço". -->
        <h2>Meus Hobbies</h2>
        <p>Aqui irei descrever meus interesses pessoais.</p>
    </div>

    <div id="meu-curso">
        <h2>Meu Curso</h2>
        <p>Aqui irei falar sobre meu curso Superior</p>
    </div>
</body>

</html>
